name: "Tests"

on:
  pull_request:

  push:
    branches: [ "*" ]

  schedule:
    - cron: "0 8 * * 1"

jobs:
  test85:
    name: "PHP 8.5"
    uses: contributte/.github/.github/workflows/nette-tester.yml@v1
    with:
      php: "8.5"

  test84:
    name: "PHP 8.4"
    uses: contributte/.github/.github/workflows/nette-tester.yml@v1
    with:
      php: "8.4"

  test83:
    name: "PHP 8.3"
    uses: contributte/.github/.github/workflows/nette-tester.yml@v1
    with:
      php: "8.3"

  test82:
    name: "PHP 8.2"
    uses: contributte/.github/.github/workflows/nette-tester.yml@v1
    with:
      php: "8.2"

  testlower:
    name: "Lowest dependencies"
    uses: contributte/.github/.github/workflows/nette-tester.yml@v1
    with:
      php: "8.2"
      composer: "composer update --no-interaction --no-progress --prefer-dist --prefer-stable --prefer-lowest"

  snapshots:
    name: "Snapshots"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none

      - name: "Install dependencies"
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: "Check ruleset and set parity"
        run: bash .dev/check-ruleset-sets-parity.sh

      - name: "Build ruleset diff report"
        run: bash .dev/ruleset-diff-report.sh

      - name: "Build sniff coverage matrix"
        run: python3 .dev/sniff-coverage-matrix.py

      - name: "Upload ruleset diff report"
        uses: actions/upload-artifact@v4
        with:
          name: ruleset-diff-report
          path: .reports/ruleset-diff.md

      - name: "Upload sniff coverage matrix"
        uses: actions/upload-artifact@v4
        with:
          name: sniff-coverage-matrix
          path: |
            .reports/sniff-coverage-matrix.csv
            .reports/sniff-coverage-summary.md

      - name: "Regenerate snapshots"
        run: php bin/snapshots

      - name: "Check for snapshot drift"
        run: git diff --exit-code
